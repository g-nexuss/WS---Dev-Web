<label for="price">Preço:</label>
<input type="number" id="price" name="price" placeholder="Digite o preço" min="0" step="0.01" required />

<label for="stock">Quantidade em estoque:</label>
<input type="number" id="stock" name="stock" placeholder="Digite a quantidade" min="0" required />

<label for="category">Categoria:</label>
<select id="category" name="category" required>
  <option value="" disabled selected>Selecione</option>
  <option value="eletronicos">Eletrônicos</option>
  <option value="vestuario">Vestuário</option>
  <option value="alimentos">Alimentos</option>
  <option value="livros">Livros</option>
  <option value="outros">Outros</option>
</select>

<label for="color">Cor do produto:</label>
<select id="color" name="color" required>
  <option value="" disabled selected>Selecione</option>
  <option value="vermelho">Vermelho</option>
  <option value="azul">Azul</option>
  <option value="preto">Preto</option>
  <option value="branco">Branco</option>
  <option value="outro">Outro</option>
</select>

<label for="image">Imagem do produto:</label>
<input type="file" id="image" name="image" accept="image/*" />

<div class="buttons">
  <button type="submit" class="save">Salvar</button>
  <button type="reset" class="clear">Limpar</button>
</div>
