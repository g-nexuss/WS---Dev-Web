<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moda Style</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Moda Style</h1>
        <nav>
            <a href="#">Início</a>
            <a href="#">Coleções</a>
            <a href="#">Novidades</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <section class="banner">
        <h2>Vista seu melhor estilo</h2>
        <p>As tendências da moda para todas as ocasiões.</p>
        <button>Comprar Agora</button>
    </section>

    <section class="produtos">
        <h2>Nova Coleção</h2>

        <div class="cards">

            <div class="card">
                <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=400" alt="Camiseta">
                <h3>Camiseta Casual</h3>
                <p>R$ 79,90</p>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=400" alt="Vestido">
                <h3>Vestido Elegante</h3>
                <p>R$ 149,90</p>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=400" alt="Jaqueta">
                <h3>Jaqueta Jeans</h3>
                <p>R$ 199,90</p>
            </div>

        </div>
    </section>

    <footer>
        <p>© 2026 Moda Style - Todos os direitos reservados.</p>
    </footer>

</body>
</html>
