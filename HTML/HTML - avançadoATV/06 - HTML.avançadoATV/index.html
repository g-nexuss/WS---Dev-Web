<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portal de Cursos</title>
</head>
<body>
    <h1>Curso de Programação</h1>

    <!-- Vídeo com source e legenda -->
    <video controls width="400">
        <source src="aula01.mp4" type="video/mp4">
        <track src="legenda-pt.vtt" kind="subtitles" srclang="pt" label="Português">
        Seu navegador não suporta vídeos.
    </video>

    <!-- Áudio -->
    <audio controls>
        <source src="podcast.mp3" type="audio/mpeg">
        Seu navegador não suporta áudio.
    </audio>

    <!-- Iframe (exemplo do Google Maps) -->
    <iframe 
        src="https://www.google.com/maps/embed?..." 
        width="400" height="300" allowfullscreen="" loading="lazy">
    </iframe>
</body>
</html>
