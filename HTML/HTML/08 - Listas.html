<head>

    <title>Listas</title>
</head>
<body>
    <h3>Listas não ordenadas</h3>
    <ul>
<li>Item 1</li>
<li>Item 2</li>
<li>Item 3</li>

        <li>Item A</li>

    </ol>

    <ol>
        <li>Manu</li>

    </ol>

</html>
