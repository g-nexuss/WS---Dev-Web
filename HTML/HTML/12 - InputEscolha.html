<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inputs de escolha</title>
</head>
<body>
    <h1>Inputs de escolha</h1>
    <form action="./">
        <label for="opcao">
            <input type="radio" name="opcao">Opção 01
        </label>
        <label for="opcao">
            <input type="radio" name="opcao" checked>Opção 02
        </label>
        <label for="opcao">
            <input type="radio" name="opcao">Opção 03
        </label>
        <br>
        <label for="opcoes">
            <input type="checkbox" name="opcoes" id="opcao1">Opção 01
        </label>
        <label for="opcoes">
            <input type="checkbox" name="opcoes" id="opcao2" checked>Opção 02
        </label>
        <label for="opcoes">
            <input type="checkbox" name="opcoes" id="opcao3">Opção 03
        </label>
    </form>
</body>
</html>
