<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outros Inputs</title>
</head>
<textarea>
    <h1>Outros Inputs</h1>
    <label for="cor">Cor</label>
    <input type="color" name="cor" id="cor">

    <label for="data">Data</label>
    <input type="date" name="data" id="data">
    </br><br>
    <label for="email">E-mail</label>
    <input type="email" name="email" id="email" placeholder="Digite um email">
    </br><br>
    <label for="url">URL</label>
    <input type="url" name="url" id="url" placeholder="https://">
    </br><br>
    <label for="bio">Biografia</label>
    <input type="bio" name="bio" id="bio" rows="5" cols="30" placeholder="Escreva sua biografia"></textarea>
</body>
</html>
