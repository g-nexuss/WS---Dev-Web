<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos e Interações</title>
    <style>
        button{
            background-color: navy;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 10px #aaa;
        }
        button:hover {
            background-color: rgb(0, 0, 128, 0.8);
        }
    </style>
</head>
<body>
    <h1>Eventos e Interações</h1>

    <p id="mensagem">Texto de HTML que será manipulado.</p>

    <button onclick="mensagem()">Usando onclick</button>
    <button id="botaoEvento">Usando addEventListener</button>
   
    <script src="script.js"></script>
</body>
</html>
